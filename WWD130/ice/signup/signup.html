<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
            max-width: 300px;
            margin: auto;
        }
        #formContainer{
            background-color:white;
            width:300px;
            height: 500px;
            border:15px solid blue;
            border-radius: 10%;
        }
        
    
        
        
        
        #title{background-image:url("./images/jesus_feeds_5000.jpeg"); 
        background-position: center; height:200px; background-size:cover;
        
    }


        #title h1{font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-align:center; padding-top: 25%;
        }


        #title h2 {font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-align: center;

        }
    
        #main{
            background-color: rgb(255, 255, 255);
            top: 120px;
            width: 300px;
            height:300px ;

        }
        #main h3{ text-align: center;

        }
    #closeBtn{
        background-color: rgb(255, 255, 255);
        top: -110px;
        position: absolute; top:20px }
    #footer {display: grid;
    grid-template-columns:repeat(5,1fr);
width:100%;}
    .books {
    width:100% ;}

    
    </style>






</head>

<body>
    <div id="formContainer">
        <div id="title">
            <h1> Daily Feed</h1>
            <div id="main">
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>
            <div>main</div>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
    </div>
    <div id="output"></div>
    
<footer id="footer"> 
    <img src="images/book_of_mormon.webp" class="books">
             <img src="images/doctrine_and_covenants.webp"class="books">
                <img src="images/new_testament.webp" class="books">
                    <img src="images/old_testament.webp" class="books">
                        <img src="images/pearl_of_great_price.webp" class="books">
</footer>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>



</html>
